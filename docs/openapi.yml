openapi: 3.0.3
info:
  title: AI Model Provenance API
  version: 2026-04-15
  description: |
    Final API surface for the SDK-first AI provenance system.

    Main write path:
    - authenticate with username/password
    - submit through the Python SDK
    - backend relay preserves the authenticated owner's wallet
    - provenance writes are verifier-gated

    Boundary notes:
    - the file-backed local account system in this repository is a runnable prototype baseline, not a production identity stack
    - `/api/v2/models` exposes a backend-managed owner-scoped index, not a claim of full chain inventory

servers:
  - url: http://127.0.0.1:3000
    description: Local development server

tags:
  - name: Health
  - name: Auth
  - name: Admin
  - name: Status
  - name: Models
  - name: Audit
  - name: Lifecycle
  - name: Provenance
  - name: IPFS

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Backend health check
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/status:
    get:
      tags: [Status]
      summary: Legacy compatibility alias for v2 status
      responses:
        '200':
          description: Status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v2/status:
    get:
      tags: [Status]
      summary: Runtime status across chains and contracts
      responses:
        '200':
          description: Status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '423':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Return the authenticated session identity
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List backend users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Admin]
      summary: Create a backend user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/users/{username}:
    patch:
      tags: [Admin]
      summary: Update a backend user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Admin]
      summary: Delete a backend user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/models:
    get:
      tags: [Models]
      summary: List models from the backend-managed owner-scoped index
      parameters:
        - in: query
          name: chain
          schema:
            $ref: '#/components/schemas/ChainName'
          required: false
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/models:
    get:
      tags: [Models]
      summary: Legacy compatibility alias for model list
      parameters:
        - in: query
          name: chain
          schema:
            $ref: '#/components/schemas/ChainName'
          required: false
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'

  /api/v2/models/{id}:
    get:
      tags: [Models]
      summary: Load one model by numeric ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: chain
          required: false
          schema:
            $ref: '#/components/schemas/ChainName'
      responses:
        '200':
          description: Model summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/models/resolve:
    get:
      tags: [Models]
      summary: Resolve a model by chain, owner, and model name
      parameters:
        - in: query
          name: chain
          required: true
          schema:
            $ref: '#/components/schemas/ChainName'
        - in: query
          name: owner
          required: true
          schema:
            type: string
        - in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResolveResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/register:
    post:
      tags: [Models]
      summary: Register a model through the owner-preserving backend relay
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/audit/recent:
    get:
      tags: [Audit]
      summary: Fetch recent audit events
      parameters:
        - in: query
          name: chain
          required: false
          schema:
            $ref: '#/components/schemas/ChainName'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Recent audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditRecentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/audit/verify/{id}:
    get:
      tags: [Audit]
      summary: Verify one model's provenance chain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: chain
          required: false
          schema:
            $ref: '#/components/schemas/ChainName'
      responses:
        '200':
          description: Audit verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditVerifyResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/audit:
    post:
      tags: [Audit]
      summary: Convenience audit verification request with JSON body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditPostRequest'
      responses:
        '200':
          description: Audit verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPostResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle/query:
    post:
      tags: [Lifecycle]
      summary: Load lifecycle versions by secret without exposing the secret in the URL
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleQueryRequest'
      responses:
        '200':
          description: Lifecycle versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleQueryResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle/download:
    post:
      tags: [Lifecycle]
      summary: Download one lifecycle version by secret and model hash
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleDownloadRequest'
      responses:
        '200':
          description: Binary model artifact
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle:
    get:
      tags: [Lifecycle]
      summary: Deprecated lifecycle URL
      deprecated: true
      responses:
        '410':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle/download:
    get:
      tags: [Lifecycle]
      summary: Deprecated lifecycle download URL
      deprecated: true
      responses:
        '410':
          $ref: '#/components/responses/ErrorResponse'

  /api/sdk/provenance:
    post:
      tags: [Provenance]
      summary: Submit verifier-gated provenance from the SDK
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvenanceSubmitRequest'
      responses:
        '200':
          description: Provenance write accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceSubmitResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/upload/file:
    post:
      tags: [IPFS]
      summary: Upload a binary file to Pinata
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IpfsUploadFileRequest'
      responses:
        '200':
          description: IPFS upload success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/upload/metadata:
    post:
      tags: [IPFS]
      summary: Upload metadata JSON to Pinata
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IpfsUploadMetadataRequest'
      responses:
        '200':
          description: IPFS upload success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/cat/{cid}:
    get:
      tags: [IPFS]
      summary: Read IPFS content as base64
      parameters:
        - in: path
          name: cid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Base64-wrapped IPFS content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsCatResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ErrorResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChainName:
      type: string
      enum: [sepolia, tbnb]

    User:
      type: object
      required: [username, walletAddress, role, status]
      properties:
        username:
          type: string
        walletAddress:
          type: string
        role:
          type: string
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    HealthResponse:
      type: object
      required: [success, status, timestamp, jwtSecretMode, warnings]
      properties:
        success:
          type: boolean
          example: true
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: integer
        jwtSecretMode:
          type: string
          enum: [configured, ephemeral]
        warnings:
          type: array
          items:
            type: string

    ChainStatus:
      type: object
      required: [blockNumber, connected, balance, knownModels, zkEnforced, provenanceMode]
      properties:
        blockNumber:
          type: integer
          nullable: true
        connected:
          type: boolean
        balance:
          type: string
          nullable: true
        knownModels:
          type: integer
        zkEnforced:
          type: boolean
        provenanceMode:
          type: string
          enum: [verifier-gated, legacy]
        walletAddress:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        balanceError:
          type: string
          nullable: true

    StatusResponse:
      type: object
      required:
        - success
        - chains
        - contracts
        - optionalExtensions
        - totalModels
        - totalAudits
        - zkReady
        - zkEnforced
        - inventoryMode
        - inventoryScope
        - authStoreMode
        - authStoreVersion
        - jwtSecretMode
        - authLockoutPolicy
        - authMode
        - relayMode
        - warnings
      properties:
        success:
          type: boolean
          example: true
        chains:
          type: object
          required: [sepolia, tbnb]
          properties:
            sepolia:
              $ref: '#/components/schemas/ChainStatus'
            tbnb:
              $ref: '#/components/schemas/ChainStatus'
        contracts:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        optionalExtensions:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        totalModels:
          type: integer
        totalAudits:
          type: integer
        zkReady:
          type: boolean
        zkEnforced:
          type: boolean
        inventoryMode:
          type: string
          enum: [backend-index]
        inventoryScope:
          type: string
          enum: [owner-scoped-known-models]
        authStoreMode:
          type: string
          enum: [stateful-file-store]
        authStoreVersion:
          type: integer
        jwtSecretMode:
          type: string
          enum: [configured, ephemeral]
        authLockoutPolicy:
          type: object
          required: [threshold, durationSeconds]
          properties:
            threshold:
              type: integer
            durationSeconds:
              type: integer
        authMode:
          type: string
          enum: [jwt]
        relayMode:
          type: string
          enum: [relay-enabled, read-only]
        warnings:
          type: array
          items:
            type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [success, token, expiresAt, user]
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      required: [success, user]
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: '#/components/schemas/User'

    AdminUserCreateRequest:
      type: object
      required: [username, password, walletAddress, role]
      properties:
        username:
          type: string
        password:
          type: string
        walletAddress:
          type: string
        role:
          type: string
          enum: [researcher, admin]
        status:
          type: string
          enum: [active, disabled]
          default: active

    AdminUserUpdateRequest:
      type: object
      properties:
        password:
          type: string
        walletAddress:
          type: string
        role:
          type: string
          enum: [researcher, admin]
        status:
          type: string
          enum: [active, disabled]

    AdminUserResponse:
      type: object
      required: [success, user]
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: '#/components/schemas/User'

    AdminUserListResponse:
      type: object
      required: [success, users]
      properties:
        success:
          type: boolean
          example: true
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    ModelSummary:
      type: object
      required: [id, numericId, name, description, chain, status, isActive, staked]
      properties:
        id:
          type: string
        numericId:
          type: integer
        name:
          type: string
        description:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        owner:
          type: string
          nullable: true
        status:
          type: string
          enum: [DRAFT, ACTIVE, DEPRECATED, REVOKED, PENDING_REGISTRATION, UNKNOWN]
        isActive:
          type: boolean
        staked:
          type: boolean
        pending:
          type: boolean
          nullable: true

    ModelListResponse:
      type: object
      required: [success, inventoryMode, inventoryScope, isCompleteInventory, models]
      properties:
        success:
          type: boolean
          example: true
        inventoryMode:
          type: string
          enum: [backend-index]
        inventoryScope:
          type: string
          enum: [owner-scoped-known-models]
        isCompleteInventory:
          type: boolean
          enum: [false]
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelSummary'

    ModelDetailResponse:
      type: object
      required: [success, id, chain, status, isActive, staked]
      properties:
        success:
          type: boolean
          example: true
        id:
          type: integer
        chain:
          $ref: '#/components/schemas/ChainName'
        owner:
          type: string
          nullable: true
        status:
          type: string
        isActive:
          type: boolean
        staked:
          type: boolean

    ModelResolveResponse:
      type: object
      required: [success, resolutionMode, model]
      properties:
        success:
          type: boolean
          example: true
        resolutionMode:
          type: string
          enum: [owner-scoped-backend-index]
        model:
          $ref: '#/components/schemas/ModelSummary'

    RegisterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        ipfsCid:
          type: string
          nullable: true
        checksum:
          type: string
          nullable: true
        framework:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        chain:
          $ref: '#/components/schemas/ChainName'

    RegisterResponse:
      type: object
      required: [success, id, numericId, name, chain, isActive]
      properties:
        success:
          type: boolean
          example: true
        id:
          type: string
        numericId:
          type: integer
        name:
          type: string
        description:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        owner:
          type: string
          nullable: true
        isActive:
          type: boolean
        existing:
          type: boolean
          nullable: true
        pending:
          type: boolean
          nullable: true
        txHash:
          type: string
          nullable: true

    AuditEvent:
      type: object
      required: [blockNumber, blockHash, transactionHash, contractAddress, event, args]
      properties:
        blockNumber:
          type: integer
        blockHash:
          type: string
        transactionHash:
          type: string
        contractAddress:
          type: string
        event:
          type: string
        args:
          type: object
          additionalProperties:
            type: string

    AuditRecentResponse:
      type: object
      required: [success, events, blockRange]
      properties:
        success:
          type: boolean
          example: true
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        blockRange:
          type: object
          required: [from, to]
          properties:
            from:
              type: integer
            to:
              type: integer

    AuditVerifyResponse:
      type: object
      required: [success, modelId, chain, chainVerified, recordCount, latestRecord]
      properties:
        success:
          type: boolean
          example: true
        modelId:
          type: integer
        chain:
          $ref: '#/components/schemas/ChainName'
        chainVerified:
          type: boolean
        recordCount:
          type: integer
        latestRecord:
          type: object
          nullable: true
          additionalProperties: {}

    AuditPostRequest:
      type: object
      required: [modelId]
      properties:
        modelId:
          type: integer
          minimum: 1
        chain:
          $ref: '#/components/schemas/ChainName'

    AuditPostResponse:
      type: object
      required: [success, modelId, chain, chainVerified, recordCount]
      properties:
        success:
          type: boolean
          example: true
        modelId:
          type: integer
        chain:
          $ref: '#/components/schemas/ChainName'
        chainVerified:
          type: boolean
        recordCount:
          type: integer

    LifecycleQueryRequest:
      type: object
      required: [secret]
      properties:
        secret:
          type: string

    LifecycleDownloadRequest:
      type: object
      required: [secret, modelHash]
      properties:
        secret:
          type: string
        modelHash:
          type: string

    LifecycleVersion:
      type: object
      required:
        - version
        - modelId
        - modelHash
        - timestamp
        - downloadReady
      properties:
        version:
          type: string
          nullable: true
        modelId:
          type: integer
          nullable: true
        modelHash:
          type: string
          nullable: true
        timestamp:
          type: string
          nullable: true
        modelName:
          type: string
          nullable: true
        chain:
          type: string
          nullable: true
        ipfsCid:
          type: string
          nullable: true
        txHash:
          type: string
          nullable: true
        artifactFileName:
          type: string
          nullable: true
        downloadReady:
          type: boolean
        downloadSource:
          type: string
          nullable: true

    LifecycleQueryResponse:
      type: object
      required: [success, series, storageMode, createdAt, versions]
      properties:
        success:
          type: boolean
          example: true
        series:
          type: string
        storageMode:
          type: string
        createdAt:
          type: string
          nullable: true
        versions:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleVersion'

    ZKProof:
      type: object
      required: [pA, pB, pC, publicSignals]
      properties:
        pA:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
        pB:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: string
        pC:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
        publicSignals:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: string

    ProvenanceSubmitRequest:
      type: object
      required: [modelId, modelName, chain, canonicalMetadata, zkProof]
      properties:
        modelId:
          type: integer
          minimum: 1
        modelName:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        canonicalMetadata:
          type: string
          description: Stable JSON string that the backend re-hashes into statementHash
        zkProof:
          $ref: '#/components/schemas/ZKProof'

    ProvenanceSubmitResponse:
      type: object
      required: [success, tx, modelId, eventType, owner, statementHash, nullifier, proofVerified]
      properties:
        success:
          type: boolean
          example: true
        tx:
          type: string
        modelId:
          type: integer
        eventType:
          type: integer
        owner:
          type: string
        statementHash:
          type: string
        nullifier:
          type: string
        proofVerified:
          type: boolean

    IpfsUploadFileRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded file bytes
        fileName:
          type: string
          nullable: true

    IpfsUploadMetadataRequest:
      type: object
      required: [metadata]
      properties:
        metadata:
          type: object
          additionalProperties: {}

    IpfsUploadResponse:
      type: object
      required: [success, cid, gatewayUrl]
      properties:
        success:
          type: boolean
          example: true
        cid:
          type: string
        gatewayUrl:
          type: string

    IpfsCatResponse:
      type: object
      required: [success, content]
      properties:
        success:
          type: boolean
          example: true
        content:
          type: string
          description: Base64-encoded IPFS content
