openapi: 3.0.3
info:
  title: AI Model Provenance API
  version: 2.0.0
  description: |
    OpenAPI description for the current backend implementation in `server/server.js`.

    The API supports:
    - backend health and chain status queries
    - model listing and model detail lookup
    - audit verification and recent audit event lookup
    - lifecycle lookup and version download by model secret
    - backend-mediated model registration and provenance submission
    - IPFS file and metadata upload through Pinata-backed routes

    Scope note:
    the default runtime write path is now verifier-gated. The SDK submits a
    canonical metadata string plus proof arguments, and the backend writes
    through `ZKProvenanceTracker.addVerifiedRecord(...)`.
  contact:
    name: FYP Project
    url: https://github.com/zhouziyu12/final-year-project

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
  - name: Status
  - name: Models
  - name: Audit
  - name: Lifecycle
  - name: Registration
  - name: Provenance
  - name: IPFS

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/status:
    get:
      tags: [Status]
      summary: Get aggregated backend and chain status
      operationId: getLegacyStatus
      responses:
        '200':
          description: Status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v2/status:
    get:
      tags: [Status]
      summary: Get aggregated backend and chain status
      operationId: getStatus
      responses:
        '200':
          description: Status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/models:
    get:
      tags: [Models]
      summary: List known models
      operationId: listLegacyModels
      parameters:
        - $ref: '#/components/parameters/ChainQuery'
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/models:
    get:
      tags: [Models]
      summary: List known models
      operationId: listModels
      parameters:
        - $ref: '#/components/parameters/ChainQuery'
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/models/{id}:
    get:
      tags: [Models]
      summary: Get model detail by numeric ID
      operationId: getModelById
      parameters:
        - $ref: '#/components/parameters/ModelIdPath'
        - $ref: '#/components/parameters/ChainQuery'
      responses:
        '200':
          description: Model detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/audit/recent:
    get:
      tags: [Audit]
      summary: List recent audit events
      operationId: listRecentAuditEvents
      parameters:
        - $ref: '#/components/parameters/ChainQuery'
        - name: limit
          in: query
          required: false
          description: Maximum number of decoded events to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Recent audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentAuditResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/audit/verify/{id}:
    get:
      tags: [Audit]
      summary: Verify a model's provenance chain
      operationId: verifyAuditChain
      parameters:
        - $ref: '#/components/parameters/ModelIdPath'
        - $ref: '#/components/parameters/ChainQuery'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditVerifyResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle:
    get:
      tags: [Lifecycle]
      summary: Load one model series lifecycle by secret
      operationId: getLifecycleBySecret
      parameters:
        - name: secret
          in: query
          required: true
          description: Lifecycle secret associated with one model series
          schema:
            type: string
            maxLength: 512
      responses:
        '200':
          description: Lifecycle version list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/v2/lifecycle/download:
    get:
      tags: [Lifecycle]
      summary: Download one model version from IPFS by secret and model hash
      operationId: downloadLifecycleVersion
      parameters:
        - name: secret
          in: query
          required: true
          description: Lifecycle secret associated with one model series
          schema:
            type: string
            maxLength: 512
        - name: modelHash
          in: query
          required: true
          description: Version-level model hash used to identify the requested artifact
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Binary model artifact streamed from IPFS
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /api/audit:
    post:
      tags: [Audit]
      summary: Verify a model's provenance chain through the write-protected route
      operationId: verifyAuditChainViaPost
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AuthTimestampHeader'
        - $ref: '#/components/parameters/AuthNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditVerifyRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPostResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/register:
    post:
      tags: [Registration]
      summary: Register a model through the backend wallet
      operationId: registerModel
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AuthTimestampHeader'
        - $ref: '#/components/parameters/AuthNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterModelRequest'
      responses:
        '200':
          description: Registration accepted or existing model returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterModelResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/sdk/provenance:
    post:
      tags: [Provenance]
      summary: Submit a provenance event through the backend relay
      operationId: submitProvenance
      description: |
        Records a provenance event on the selected chain through the verifier-gated
        runtime path.

        The model must already be registered. The backend validates the exact
        canonical metadata string, recomputes `statementHash`, and rejects the
        request unless the supplied proof signals match that statement.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AuthTimestampHeader'
        - $ref: '#/components/parameters/AuthNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvenanceRequest'
      responses:
        '200':
          description: Provenance event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvenanceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/upload/file:
    post:
      tags: [IPFS]
      summary: Upload a file to IPFS
      operationId: uploadFileToIpfs
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AuthTimestampHeader'
        - $ref: '#/components/parameters/AuthNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '200':
          description: File upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/upload/metadata:
    post:
      tags: [IPFS]
      summary: Upload metadata JSON to IPFS
      operationId: uploadMetadataToIpfs
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AuthTimestampHeader'
        - $ref: '#/components/parameters/AuthNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadMetadataRequest'
      responses:
        '200':
          description: Metadata upload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /api/ipfs/cat/{cid}:
    get:
      tags: [IPFS]
      summary: Retrieve IPFS content through configured gateways
      operationId: getIpfsContent
      parameters:
        - name: cid
          in: path
          required: true
          description: IPFS CID
          schema:
            type: string
      responses:
        '200':
          description: Base64-encoded content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsCatResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    ChainQuery:
      name: chain
      in: query
      required: false
      description: Target chain
      schema:
        $ref: '#/components/schemas/ChainName'
    ModelIdPath:
      name: id
      in: path
      required: true
      description: Numeric model ID
      schema:
        type: integer
        minimum: 1
    AuthTimestampHeader:
      name: x-auth-timestamp
      in: header
      required: true
      description: Millisecond timestamp used by backend write authentication
      schema:
        type: string
    AuthNonceHeader:
      name: x-auth-nonce
      in: header
      required: true
      description: Single-use nonce used by backend write authentication
      schema:
        type: string

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChainName:
      type: string
      enum: [sepolia, tbnb]

    ModelStatus:
      type: string
      enum: [DRAFT, ACTIVE, DEPRECATED, REVOKED, PENDING_REGISTRATION, UNKNOWN]

    ProvenanceAction:
      type: string
      enum:
        - REGISTERED
        - ACTIVATED
        - UPDATED
        - TRAINING_COMPLETED
        - DEPRECATED
        - REVOKED
        - VERSION_RELEASED
        - TRANSFERRED
        - STAKED
        - UNSTAKED
        - SLASHED
        - ZK_PROOF_VERIFIED

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string

    HealthResponse:
      type: object
      required: [success, status, timestamp, warnings]
      properties:
        success:
          type: boolean
          enum: [true]
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: integer
          format: int64
        warnings:
          type: array
          items:
            type: string

    ChainStatus:
      type: object
      required: [blockNumber, connected, balance, knownModels]
      properties:
        blockNumber:
          type: integer
          format: int64
          nullable: true
        connected:
          type: boolean
        balance:
          type: string
          nullable: true
          description: Wallet balance in native units, or `read-only` when no private key is configured
        knownModels:
          type: integer
        walletAddress:
          type: string
          nullable: true
        balanceError:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    StatusResponse:
      type: object
      required:
        - success
        - chains
        - totalModels
        - totalAudits
        - zkReady
        - zkEnforced
        - contracts
        - writeMode
        - warnings
      properties:
        success:
          type: boolean
          enum: [true]
        chains:
          type: object
          required: [sepolia, tbnb]
          properties:
            sepolia:
              $ref: '#/components/schemas/ChainStatus'
            tbnb:
              $ref: '#/components/schemas/ChainStatus'
        totalModels:
          type: integer
        totalAudits:
          type: integer
        zkReady:
          type: boolean
        zkEnforced:
          type: boolean
        contracts:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        writeMode:
          type: string
          enum: [enabled, read-only]
        warnings:
          type: array
          items:
            type: string

    ModelSummary:
      type: object
      required:
        - id
        - numericId
        - name
        - description
        - chain
        - owner
        - status
        - verified
        - staked
      properties:
        id:
          type: string
        numericId:
          type: integer
        name:
          type: string
        description:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        owner:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ModelStatus'
        verified:
          type: boolean
        staked:
          type: boolean
        pending:
          type: boolean
          nullable: true

    ModelsListResponse:
      type: object
      required: [success, models]
      properties:
        success:
          type: boolean
          enum: [true]
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelSummary'

    ModelDetailResponse:
      type: object
      required: [success, id, owner, status, staked]
      properties:
        success:
          type: boolean
          enum: [true]
        id:
          type: integer
        owner:
          type: string
        status:
          $ref: '#/components/schemas/ModelStatus'
        staked:
          type: boolean

    AuditEvent:
      type: object
      required:
        - blockNumber
        - blockHash
        - transactionHash
        - contractAddress
        - event
        - args
      properties:
        blockNumber:
          type: integer
          format: int64
        blockHash:
          type: string
        transactionHash:
          type: string
        contractAddress:
          type: string
        event:
          type: string
        args:
          type: object
          additionalProperties:
            type: string

    BlockRange:
      type: object
      required: [from, to]
      properties:
        from:
          type: integer
          format: int64
        to:
          type: integer
          format: int64

    RecentAuditResponse:
      type: object
      required: [success, events, blockRange]
      properties:
        success:
          type: boolean
          enum: [true]
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        blockRange:
          $ref: '#/components/schemas/BlockRange'

    AuditRecord:
      description: Raw tuple-style provenance record returned by ethers.js
      nullable: true
      oneOf:
        - type: array
          items:
            oneOf:
              - type: string
              - type: integer
              - type: boolean
        - type: object
          additionalProperties: true

    AuditVerifyResponse:
      type: object
      required: [success, modelId, chain, verified, recordCount, latestRecord]
      properties:
        success:
          type: boolean
          enum: [true]
        modelId:
          type: integer
        chain:
          $ref: '#/components/schemas/ChainName'
        verified:
          type: boolean
        recordCount:
          type: integer
        latestRecord:
          $ref: '#/components/schemas/AuditRecord'

    LifecycleVersion:
      type: object
      required:
        - version
        - modelId
        - modelHash
        - timestamp
        - downloadReady
      properties:
        version:
          type: string
          nullable: true
        modelId:
          type: integer
          nullable: true
        modelHash:
          type: string
        timestamp:
          type: string
          nullable: true
        modelName:
          type: string
          nullable: true
        chain:
          $ref: '#/components/schemas/ChainName'
          nullable: true
        ipfsCid:
          type: string
          nullable: true
        txHash:
          type: string
          nullable: true
        artifactFileName:
          type: string
          nullable: true
        downloadReady:
          type: boolean
        downloadSource:
          type: string
          nullable: true
          description: Currently `ipfs` when the version resolves to an IPFS-backed artifact

    LifecycleResponse:
      type: object
      required: [success, series, storageMode, createdAt, versions]
      properties:
        success:
          type: boolean
          enum: [true]
        series:
          type: string
        storageMode:
          type: string
          enum: [encrypted, plaintext-legacy]
        createdAt:
          type: string
          nullable: true
        versions:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleVersion'

    AuditVerifyRequest:
      type: object
      required: [modelId]
      properties:
        modelId:
          type: integer
          minimum: 1
        chain:
          $ref: '#/components/schemas/ChainName'

    AuditPostResponse:
      type: object
      required: [success, modelId, chain, verified, recordCount]
      properties:
        success:
          type: boolean
          enum: [true]
        modelId:
          type: integer
        chain:
          $ref: '#/components/schemas/ChainName'
        verified:
          type: boolean
        recordCount:
          type: integer

    RegisterModelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        ipfsCid:
          type: string
          nullable: true
        checksum:
          type: string
          nullable: true
        framework:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        chain:
          $ref: '#/components/schemas/ChainName'

    RegisterModelResponse:
      type: object
      required:
        - success
        - id
        - numericId
        - name
        - description
        - chain
        - verified
      properties:
        success:
          type: boolean
          enum: [true]
        id:
          type: string
        numericId:
          type: integer
        name:
          type: string
        description:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        owner:
          type: string
          nullable: true
        verified:
          type: boolean
        existing:
          type: boolean
          nullable: true
        pending:
          type: boolean
          nullable: true
        txHash:
          type: string
          nullable: true

    ProvenanceRequest:
      type: object
      required: [modelId, modelName, chain, canonicalMetadata, zkProof]
      properties:
        modelId:
          type: integer
          minimum: 1
        modelName:
          type: string
        chain:
          $ref: '#/components/schemas/ChainName'
        canonicalMetadata:
          type: string
          description: Stable canonical JSON string bound directly to the proof statement
        zkProof:
          type: object
          required: [pA, pB, pC, publicSignals]
          properties:
            pA:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: string
            pB:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: string
            pC:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: string
            publicSignals:
              type: array
              minItems: 3
              maxItems: 3
              items:
                type: string

    ProvenanceResponse:
      type: object
      required: [success, tx, modelId, eventType, statementHash, nullifier, proofVerified]
      properties:
        success:
          type: boolean
          enum: [true]
        tx:
          type: string
        modelId:
          type: integer
        eventType:
          type: integer
        statementHash:
          type: string
        nullifier:
          type: string
        proofVerified:
          type: boolean

    UploadFileRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64-encoded file payload
        fileName:
          type: string
          nullable: true

    UploadMetadataRequest:
      type: object
      required: [metadata]
      properties:
        metadata:
          type: object
          additionalProperties: true

    IpfsUploadResponse:
      type: object
      required: [success, cid, gatewayUrl]
      properties:
        success:
          type: boolean
          enum: [true]
        cid:
          type: string
        gatewayUrl:
          type: string

    IpfsCatResponse:
      type: object
      required: [success, content]
      properties:
        success:
          type: boolean
          enum: [true]
        content:
          type: string
          description: Base64-encoded gateway response body
