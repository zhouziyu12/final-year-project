name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ─── Smart Contract Tests ───────────────────────────────────────────────────
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile contracts
        run: npx hardhat compile
        env:
          SEPOLIA_RPC: ${{ secrets.SEPOLIA_RPC }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
      
      - name: Run tests
        run: npx hardhat test
        env:
          SEPOLIA_RPC: ${{ secrets.SEPOLIA_RPC }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: client
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

  # ─── Server Lint ───────────────────────────────────────────────────────────
  server:
    name: Server
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: server
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Syntax check
        run: node --check server.js

  # ─── ZK Circuit Build ──────────────────────────────────────────────────────
  zk:
    name: ZK Circuit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile ZK circuit
        run: |
          cd zk/circuits
          ./compile.sh || echo "Circuit compile script not found"
        continue-on-error: true

  # ─── Deploy Preview (on PR) ────────────────────────────────────────────────
  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: [contracts, frontend, server]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      
      - name: Deploy preview
        run: echo "Preview build ready at: ${{ github.event.pull_request.head.ref }}"
